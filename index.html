<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="application-name" content="Alle" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Alle" />
  <meta name="description" content="基于 Cloudflare Workers 的邮件管理系统" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#2f313a" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: light;
      background: oklab(97.072% 0.00075 -0.00265);
    }

    body {
      margin: 0;
      background: oklab(97.072% 0.00075 -0.00265);
    }

    #app-boot-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: oklab(97.072% 0.00075 -0.00265);
      opacity: 1;
      visibility: visible;
      transition: opacity 280ms ease, visibility 280ms ease;
      z-index: 2147483647;
    }

    #app-boot-loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #app-boot-loading::before {
      content: "";
      width: 40px;
      height: 40px;
      border: 3px solid rgba(15, 23, 42, 0.14);
      border-top-color: #0f172a;
      border-radius: 999px;
      animation: app-boot-loading-spin 0.72s linear infinite;
    }

    @keyframes app-boot-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        background: oklch(0.1915 0.0194 265.9654);
      }

      body {
        background: oklch(0.1915 0.0194 265.9654);
      }

      #app-boot-loading {
        background: oklch(0.1915 0.0194 265.9654);
      }

      #app-boot-loading::before {
        border-color: rgba(255, 255, 255, 0.16);
        border-top-color: rgba(255, 255, 255, 0.92);
      }
    }
  </style>
  <title>Alle</title>
</head>

<body>
  <div id="app-boot-loading" aria-label="加载中"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
